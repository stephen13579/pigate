services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: pigate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pigate_db}
      POSTGRES_USER: ${POSTGRES_USER:-pigate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: America/New_York
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${TAILSCALE_IP:?Set TAILSCALE_IP in .env}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5

  emqx:
    image: docker.io/library/emqx:5.8.6
    container_name: pigate-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE__NAME: pigate_emqx@emqx
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:?Set EMQX_DASHBOARD_PASSWORD in .env}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    ports:
      - "${TAILSCALE_IP:?Set TAILSCALE_IP in .env}:1883:1883"
      - "${TAILSCALE_IP:?Set TAILSCALE_IP in .env}:18083:18083"
    healthcheck:
      test: ["CMD-SHELL", "/opt/emqx/bin/emqx_ctl status"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  emqx-data:
  emqx-log:
